# config/exercises.yaml
# Exercise definitions for rehabilitation system (Nandana et al. 2026)
# 4 clinical upper limb stroke rehabilitation exercises

exercises:
  1:
    name: "Lifting an object"
    description: "Shoulder flexion and elbow tracking while lifting"
    landmarks: [12, 14, 16, 24]  # Shoulder, Elbow, Wrist, Hip
    thresholds:
      shoulder:
        type: "minimum"
        value: 90.0
        feedback_pass: "PASS: Lift Height OK"
        feedback_fail: "FAIL: Lift Higher!"

  2:
    name: "Extending the elbow"
    description: "Full elbow extension practice"
    landmarks: [12, 14, 16, 24]  # Shoulder, Elbow, Wrist, Hip
    thresholds:
      elbow:
        type: "minimum"
        value: 160.0
        feedback_pass: "PASS: Arm Straight"
        feedback_fail: "FAIL: Straighten Arm!"

  3:
    name: "Lifting the wrist"
    description: "Wrist dorsiflexion tracking"
    landmarks: [14, 16, 18, 20]  # Elbow(->shoulder slot), Wrist(->elbow slot), Pinky(->wrist slot), Index(->hip slot)
    thresholds:
      elbow:  # angle at wrist (elbow-wrist-pinky): ~170-180 when flat, decreases when wrist is lifted
        type: "maximum"
        value: 165.0
        feedback_pass: "PASS: Wrist Lifted"
        feedback_fail: "FAIL: Lift Wrist More"

  4:
    name: "Opening the hand"
    description: "Finger extension and hand opening"
    landmarks: [16, 18, 20, 22]  # Wrist(→shoulder slot), Pinky(→elbow slot), Index(→wrist slot), Thumb(→hip slot)
    thresholds:
      shoulder:  # computed as angle at wrist: thumb-wrist-pinky = hand opening spread
        type: "minimum"
        value: 45.0
        feedback_pass: "PASS: Hand Open"
        feedback_fail: "FAIL: Open Hand Wider!"
