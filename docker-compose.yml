version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rehab-api:latest
    container_name: rehab-api
    ports:
      - "8000:8000"
    environment:
      - REHAB_API_KEY=${REHAB_API_KEY:-}          # empty = auth disabled
      - REHAB_LOG_LEVEL=${REHAB_LOG_LEVEL:-INFO}
    volumes:
      - logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  logs:
    driver: local
